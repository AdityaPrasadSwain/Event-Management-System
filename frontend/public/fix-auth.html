<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Auth - Clear Storage</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fix Authentication</h1>
        <p>If you're seeing "NULL_ADMIN" or login issues, click below to clear corrupted data:</p>
        
        <button onclick="clearAuth()">Clear Auth Data</button>
        <button onclick="checkAuth()">Check Current Auth</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        function clearAuth() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            localStorage.removeItem('user');
            localStorage.removeItem('themeMode');
            sessionStorage.clear();
            
            const status = document.getElementById('status');
            status.className = 'status success';
            status.style.display = 'block';
            status.innerHTML = `
                <h3>✅ Auth Data Cleared!</h3>
                <p>All authentication data has been removed.</p>
                <p>Redirecting to login in 2 seconds...</p>
            `;
            
            setTimeout(() => {
                window.location.href = 'http://localhost:5173/login';
            }, 2000);
        }
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            const user = localStorage.getItem('user');
            
            const status = document.getElementById('status');
            status.className = 'status info';
            status.style.display = 'block';
            
            if (!token) {
                status.innerHTML = '<h3>No Auth Data Found</h3><p>You are not logged in.</p>';
                return;
            }
            
            // Decode JWT
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                const decoded = JSON.parse(jsonPayload);
                
                status.innerHTML = `
                    <h3>📋 Current Auth Status</h3>
                    <p><strong>Email:</strong> ${decoded.sub || 'N/A'}</p>
                    <p><strong>Roles:</strong> ${JSON.stringify(decoded.roles || decoded.role || 'NONE')}</p>
                    <p><strong>Expires:</strong> ${new Date(decoded.exp * 1000).toLocaleString()}</p>
                    <hr>
                    <p><small>LocalStorage Role: ${role || 'Not set'}</small></p>
                    <pre style="text-align: left; background: #f5f5f5; padding: 10px; border-radius: 5px; overflow: auto;">
${JSON.stringify(decoded, null, 2)}
                    </pre>
                `;
            } catch (e) {
                status.innerHTML = `<h3>❌ Invalid Token</h3><p>Token is corrupted: ${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
