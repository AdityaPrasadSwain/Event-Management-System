# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/sems_db
spring.datasource.username=postgres
spring.datasource.password=Aditya

# JPA / Hibernate Configuration
# PROD-READY: Use ddl-auto=validate + Flyway for migrations
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration_final
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.sems.security=DEBUG

# JWT Configuration
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# Performance Optimization
# GZIP Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Cache Configuration - FAIL-SAFE
# simple = In-memory cache (default, no Redis required)
# redis = Distributed cache (requires Redis running)
spring.cache.type=simple

# Redis Configuration (only used if spring.cache.type=redis)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Exclude Redis AutoConfiguration to prevent startup failures when Redis is down
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
