<!DOCTYPE html>
<html>

<body style="margin:0; font-family: Arial, sans-serif; background:#f4f6f9;">
    <table width="100%">
        <tr>
            <td align="center">
                <table width="600"
                    style="background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.08);">
                    <tr>
                        <td
                            style="background:linear-gradient(90deg,#0d6efd,#4dabf7); color:#fff; padding:25px; text-align:center;">
                            <h1>🎟️ Booking Confirmed</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:25px;">
                            <p>Hello <b>{{userName}}</b>,</p>
                            <p>Your booking for <b>{{eventTitle}}</b> is confirmed.</p>
                            <table width="100%" style="background:#f1f7ff; padding:15px; border-radius:8px;">
                                <tr>
                                    <td><b>Date:</b> {{eventDate}}</td>
                                </tr>
                                <tr>
                                    <td><b>Seats:</b> {{seatCount}}</td>
                                </tr>
                                <tr>
                                    <td><b>Booking ID:</b> {{bookingId}}</td>
                                </tr>
                            </table>
                            <p style="margin-top:20px;">We look forward to seeing you!</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="background:#f1f1f1; text-align:center; padding:15px; font-size:12px;">
                            © 2026 SEMS • support@sems.com
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
